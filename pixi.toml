[workspace]
authors = ["chengxuewen <1398831004@qq.com>"]
channels = ["conda-forge"]
name = "SynapticSYS"
platforms = ["osx-64", "linux-aarch64"]
version = "0.1.0"

[tasks]

[dependencies]
cunit = ">=2.1.3,<3"
asio = ">=1.36.0,<2"
eigen = ">=3.4.0,<4"
freetype = ">=2.14.1,<3"
tinyxml2 = ">=11.0.0,<12"
sip = ">=6.12.0,<7"
openssl = ">=3"
pcre = ">=8.45,<9"
poco = ">=1.15.0,<2"
pytest-mock = ">=3.14.1,<4"
rosdep = ">=0.26.0,<0.27"
rosdistro = ">=1.0.1,<2"
setuptools = "==59.6.0"
vcstool = ">=0.3.0,<0.4"
catkin_pkg = ">=1.0.0,<2"
coverage = ">=7.10.4,<8"
cryptography = ">=45.0.6,<46"
empy = ">=3.3.4,<4"
flake8 = ">=7.3.0,<8"
flake8-blind-except = "==0.1.1"
flake8-builtins = ">=3.0.0,<4"
flake8-class-newline = ">=1.6.0,<2"
flake8-comprehensions = ">=3.16.0,<4"
flake8-deprecated = ">=2.2.1,<3"
flake8-docstrings = ">=1.7.0,<2"
flake8-import-order = ">=0.19.2,<0.20"
flake8-quotes = ">=3.4.0,<4"
importlib-metadata = ">=8.7.0,<9"
jsonschema = ">=4.25.1,<5"
graphviz = ">=14.1.2,<15"

[feature.base.target.linux-aarch64.dependencies]
libacl = "2.3.*"
lttng-ust = "*"

[feature.base.target.osx-64.dependencies]
libcxx = "*"
libgcc = "*"

[feature.base.dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
argcomplete = ">=3.6.2,<4"
numpy = ">=2.0.2,<3"
python = "3.9.*"
lark = "==1.1.1"
yaml = "*"

[feature.extensions.dependencies]
opencv = ">=4.0.0,<5"
qt = "5.15.*"

[environments]
extensions = { no-default-feature = true, features = ["base", "extensions"]}
base = { no-default-feature = true, features = ["base"]}
default = { features = ["base", "extensions"]}
